<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="BT_CAFE.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" environment-image="music_hall_01_1k.hdr">
    <button class="Hotspot" slot="hotspot-1" data-position="-0.16589197864999816m 0.01001203742957435m 0.11258072449475598m" data-normal="-0.9731566672839574m 0.22986087212013545m -0.01140527899491354m" data-visibility-attribute="visible">
        <div class="HotspotAnnotation">Café Chocolate
            En el corazón del Eje Cafetero colombiano, en la pintoresca región de Córdoba</div>
    </button>
    <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
    </div>
    <button slot="ar-button" id="ar-button">
        View in your space
    </button>
    <div id="ar-prompt">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
    </div>
</model-viewer>
 
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
     <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  </body>
</html>
